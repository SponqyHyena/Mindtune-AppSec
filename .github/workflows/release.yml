name: Release

permissions:
  contents: write
  pull-requests: read
  actions: read
  checks: read

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          enable-comments: true
          enable-summary: true
      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: p/csharp
          output: semgrep.sarif
          generateSarif: "1"

  tests:
    needs: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          lfs: true
          fetch-depth: 0

      - name: Increase file descriptor limit
        run: |
          echo "=== Increasing file descriptor limit ==="
          ulimit -n 4096
          echo "New file descriptor limit: $(ulimit -n)"

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: |
            Library
            Temp
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-
            Library-

      - name: Cache Unity Global
        uses: actions/cache@v4
        with:
          path: ~/.cache/unity
          key: UnityGlobal-${{ runner.os }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            UnityGlobal-${{ runner.os }}-

      - name: Get Unity Version
        id: unity_version
        run: |
          if [ -f "ProjectSettings/ProjectVersion.txt" ]; then
            UNITY_VERSION=$(grep "m_EditorVersion:" ProjectSettings/ProjectVersion.txt | cut -d ' ' -f 2)
            echo "unity_version=$UNITY_VERSION" >> $GITHUB_OUTPUT
            echo "Using Unity version: $UNITY_VERSION"
          else
            echo "ProjectVersion.txt not found!"
            exit 1
          fi

      - name: Run Unity Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: .
          unityVersion: ${{ steps.unity_version.outputs.unity_version }}
          testMode: all
          artifactsPath: test-artifacts
          customParameters: -testFilter SecurityTests

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: test-artifacts

  build:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          lfs: true
          fetch-depth: 0

      - name: Get Unity Version
        id: unity_version
        run: |
          if [ -f "ProjectSettings/ProjectVersion.txt" ]; then
            UNITY_VERSION=$(grep "m_EditorVersion:" ProjectSettings/ProjectVersion.txt | cut -d ' ' -f 2)
            echo "unity_version=$UNITY_VERSION" >> $GITHUB_OUTPUT
            echo "Using Unity version: $UNITY_VERSION"
          else
            echo "ProjectVersion.txt not found!"
            exit 1
          fi

      - name: Increase file descriptor limit
        run: |
          echo "=== Increasing file descriptor limit ==="
          ulimit -n 4096
          echo "New file descriptor limit: $(ulimit -n)"

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: |
            Library
            Temp
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-
            Library-

      - name: Cache Unity Global
        uses: actions/cache@v4
        with:
          path: ~/.cache/unity
          key: UnityGlobal-${{ runner.os }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            UnityGlobal-${{ runner.os }}-

      - name: Build Unity Project
        uses: game-ci/unity-builder@v5.0.0
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          MONO_IO_OPTIONS: UseMmap=1
          MONO_THREADS_SUSPEND: preemptive
        with:
          projectPath: .
          targetPlatform: Android
          unityVersion: ${{ steps.unity_version.outputs.unity_version }}
          versioning: None
          androidKeystoreName: release.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          androidTargetSdkVersion: 33

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-build
          path: build/Android

      - name: Find APK file
        id: find_apk
        run: |
          APK_FILE=$(find build/Android -name "*.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then
            echo "No APK file found!"
            exit 1
          fi
          echo "apk_path=$APK_FILE" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_FILE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.find_apk.outputs.apk_path }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}