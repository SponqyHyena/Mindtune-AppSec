name: Build

permissions:
  contents: read
  security-events: write 
  pull-requests: write
  actions: read
  checks: write
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          enable-comments: true
          enable-summary: true
      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: p/csharp
          output: semgrep.sarif
          generateSarif: "1"

  build:
    needs: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0
      - name: Increase file descriptor limit
        run: |
          echo "=== Increasing file descriptor limit ==="
          ulimit -n 4096
          echo "New file descriptor limit: $(ulimit -n)"

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: |
            Library
            Temp
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-
            Library-
      - name: Cache Unity Global
        uses: actions/cache@v4
        with:
          path: ~/.cache/unity
          key: UnityGlobal-${{ runner.os }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            UnityGlobal-${{ runner.os }}-
      - name: Get Unity Version
        id: unity_version
        run: |
          if [ -f "ProjectSettings/ProjectVersion.txt" ]; then
            UNITY_VERSION=$(grep "m_EditorVersion:" ProjectSettings/ProjectVersion.txt | cut -d ' ' -f 2)
            echo "unity_version=$UNITY_VERSION" >> $GITHUB_OUTPUT
            echo "Using Unity version: $UNITY_VERSION"
          else
            echo "ProjectVersion.txt not found!"
            exit 1
          fi
      - name: Activate Unity License
        run: |
          /opt/unity/Editor/Unity \
            -batchmode \
            -quit \
            -username "${{ secrets.UNITY_EMAIL }}" \
            -password "${{ secrets.UNITY_PASSWORD }}" \
            -serial "${{ secrets.UNITY_LICENSE }}" \
            -logFile -
            
      - name: Build Unity Project
        run: |
          mkdir -p build/Android
          
          /opt/unity/Editor/Unity \
            -batchmode \
            -quit \
            -projectPath "$(pwd)" \
            -buildTarget Android \
            -buildPath "$(pwd)/build/Android/Android.apk" \
            -logFile build.log
          
          if [ -f "build/Android/Android.apk" ]; then
            echo "Build successful! APK created."
            ls -la build/Android/
          else
            echo "Build failed! APK not found."
            cat build.log
            exit 1
          fi

      - name: Upload Build Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: build/Android
          
      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log