name: Build

permissions:
  contents: read
  security-events: write 
  pull-requests: write
  actions: read
  checks: write
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Free disk space
        shell: pwsh
        run: |
          Write-Host "=== Checking disk space BEFORE cleanup ==="
          Get-PSDrive -Name C
          
          Write-Host "=== Cleaning up disk space ==="
          
          docker system prune -a -f
          
          Remove-Item -Path "C:\Windows\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\Users\*\AppData\Local\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
          
          if (Get-Command CleanMgr.exe -ErrorAction SilentlyContinue) {
            CleanMgr.exe /sagerun:1 | Out-Null
          }
         
          Remove-Item -Path "C:\Users\*\Downloads\*" -Recurse -Force -ErrorAction SilentlyContinue
          

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          enable-comments: true
          enable-summary: true
      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: p/csharp
          output: semgrep.sarif
          generateSarif: "1"

  build:
    needs: security
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0
      
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: |
            Library
            Temp
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-
            Library-

      - name: Cache Unity Global
        uses: actions/cache@v4
        with:
          path: C:\ProgramData\Unity
          key: UnityGlobal-${{ runner.os }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            UnityGlobal-${{ runner.os }}-

      - name: Get Unity Version
        id: unity_version
        shell: pwsh
        run: |
          if (Test-Path "ProjectSettings/ProjectVersion.txt") {
            $content = Get-Content "ProjectSettings/ProjectVersion.txt"
            $version = ($content | Select-String "m_EditorVersion:").ToString().Split(' ')[1]
            echo "unity_version=$version" >> $env:GITHUB_OUTPUT
            echo "Using Unity version: $version"
          } else {
            echo "ProjectVersion.txt not found!"
            exit 1
          }

      - name: Build Unity Project
        uses: game-ci/unity-builder@v5.0.0
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEYALIAS_NAME: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          ANDROID_KEYALIAS_PASS: ${{ secrets.ANDROID_KEYALIAS_PASS }}
        with:
          targetPlatform: Android
          unityVersion: ${{ steps.unity_version.outputs.unity_version }}
          versioning: None
          customParameters: |
            -ignoreCompilerErrors
            -disableManagedDebugger
          androidTargetSdkVersion: 33

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: build/Android