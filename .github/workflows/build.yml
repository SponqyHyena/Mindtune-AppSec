name: Build

permissions:
  contents: read
  security-events: write 
  pull-requests: write
  actions: read
  checks: write
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Free disk space
        shell: pwsh
        run: |
          
          docker system prune -a -f
          
          Remove-Item -Path "C:\Windows\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\Users\*\AppData\Local\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
          
          if (Get-Command CleanMgr.exe -ErrorAction SilentlyContinue) {
            CleanMgr.exe /sagerun:1 | Out-Null
          }
         
          Remove-Item -Path "C:\Users\*\Downloads\*" -Recurse -Force -ErrorAction SilentlyContinue
          

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          enable-comments: true
          enable-summary: true
      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: p/csharp
          output: semgrep.sarif
          generateSarif: "1"

  build:
    needs: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Increase system limits
        run: |
          echo "=== Increasing system limits ==="
          ulimit -n 4096
          echo "File descriptor limit: $(ulimit -n)"
          echo "Max user processes: $(ulimit -u)"
         
          sudo sysctl -w fs.file-max=65536 2>/dev/null || true
          echo "fs.file-max: $(cat /proc/sys/fs/file-max)"

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-
            Library-

      - name: Cache Unity Global
        uses: actions/cache@v4
        with:
          path: ~/.cache/unity
          key: UnityGlobal-${{ runner.os }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            UnityGlobal-${{ runner.os }}-

      - name: Get Unity Version
        id: unity_version
        run: |
          if [ -f "ProjectSettings/ProjectVersion.txt" ]; then
            VERSION=$(grep "m_EditorVersion:" ProjectSettings/ProjectVersion.txt | cut -d ' ' -f 2)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Unity version: $VERSION"
          else
            echo "ProjectVersion.txt not found!"
            exit 1
          fi


      - name: Build Unity Project
        uses: game-ci/unity-builder@v5.0.0
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          MONO_IO_OPTIONS: UseMmap=1
          MONO_THREADS_SUSPEND: preemptive
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEYALIAS_NAME: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          ANDROID_KEYALIAS_PASS: ${{ secrets.ANDROID_KEYALIAS_PASS }}
        with:
          targetPlatform: Android
          unityVersion: ${{ steps.unity_version.outputs.unity_version }}
          versioning: None
          customParameters: |
            -ignoreCompilerErrors
            -disableManagedDebugger
          androidTargetSdkVersion: 33

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: build/Android